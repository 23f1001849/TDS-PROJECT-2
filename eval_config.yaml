description: "TDS Data Analyst Agent – generic eval (20-point rubric)"

providers:
  - id: https
    config:
      url: http://localhost:8000/api/ # Local testing endpoint
      method: POST
      body: file://question.txt
      transformResponse: json

assert:
  # Structural gate – no score, hard-fail if not a 4-element array
  - type: is-json
    value: {type: array, minItems: 4, maxItems: 4}
    weight: 0

  # 1️⃣ first answer must equal 1
  - type: python
    weight: 4
    value: |
      import json, sys
      result = json.loads(output)
      print(result[0] == 1)

  # 2️⃣ second answer must contain "Titanic" (case-insensitive)
  - type: python
    weight: 4
    value: |
      import json, re, sys
      result = json.loads(output)
      print(bool(re.search(r'titanic', str(result[1]), re.I)))

  # 3️⃣ third answer within ±0.001 of 0.485782
  - type: python
    weight: 4
    value: |
      import json, sys, math
      result = json.loads(output)
      print(abs(float(result[2]) - 0.485782) <= 0.001)

  # 4️⃣ basic validation of plot data URI
  - type: python
    weight: 8
    value: |
      import json, sys, base64
      result = json.loads(output)
      plot_data = result[3]
      # Check if it's a valid data URI
      is_data_uri = plot_data.startswith('data:image/')
      # Check if it contains base64 data
      has_base64 = 'base64,' in plot_data
      # Check size (rough estimate)
      size_ok = len(plot_data) < 100000
      print(is_data_uri and has_base64 and size_ok)

tests:
  - description: "Data analysis"
